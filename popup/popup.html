<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <div class="zen-circle"></div>
        <h1>TabZen</h1>
      </div>
      <button id="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
    </div>
    
    <div class="search-container">
      <input type="text" id="search" placeholder="Search tabs..." autocomplete="off"/>
    </div>
    
    <div class="actions-grid">
      <button id="clean-duplicates" class="action-btn">
        <span class="icon">🧹</span> Clean Duplicates
      </button>
      <button id="zen-all" class="action-btn">
        <span class="icon">🧘</span> Zen All Tabs
      </button>
      <button id="save-session" class="action-btn primary">
        <span class="icon">💾</span> Save Session
      </button>
    </div>

    <!-- Tabs List -->
    <div class="section-header">
      <h3>Active Tabs</h3>
      <span id="tab-count" class="badge">0</span>
    </div>
    <div id="tabs-list" class="scroll-container">
      <!-- Generated by JS -->
    </div>

    <!-- Sessions List -->
    <div class="section-header">
      <h3>Saved Sessions</h3>
    </div>
    <div id="sessions-list" class="scroll-container">
      <!-- Generated by JS -->
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
